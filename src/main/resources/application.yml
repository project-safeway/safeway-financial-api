server:
  port: 8081

spring:
  application:
    name: safeway-financial

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/safeway_financial}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 10
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          max-interval: 10000
          multiplier: 2

    template:
      retry:
        enabled: true
        initial-interval: 1000
        max-attempts: 3

rabbitmq:
  exchanges:
    aluno: aluno.exchange

  queues:
    aluno-criado: financeiro.aluno.criado.queue
    aluno-atualizado: financeiro.aluno.atualizado.queue
    aluno-inativado: financeiro.aluno.inativado.queue

  routing-keys:
    aluno-criado: aluno.criado
    aluno-atualizado: aluno.atualizado
    aluno-inativado: aluno.inativado

jwt:
  private:
    key: ${JWT_PRIVATE_KEY:classpath:keys/pri.key}
  public:
    key: ${JWT_PUBLIC_KEY:classpath:keys/pub.key}

safeway:
  core:
    url: ${SAFEWAY_CORE_URL:http://localhost:8080}

auth:
  service:
    base-url: ${AUTH_SERVICE_BASE_URL:${SAFEWAY_CORE_URL:http://localhost:8080}}
    token-endpoint: ${AUTH_SERVICE_TOKEN_ENDPOINT:/auth/v2/token/service}
    client-id: ${AUTH_SERVICE_CLIENT_ID:safeway-core}
    client-secret: ${AUTH_SERVICE_CLIENT_SECRET:change-me}