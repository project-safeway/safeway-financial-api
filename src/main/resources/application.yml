server:
  port: 8081

spring:
  application:
    name: safeway-financial

  datasource:
    url: jdbc:h2:mem:safeway_financial;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

safeway:
  core:
    url: ${SAFEWAY_CORE_URL:http://localhost:8080}